name: keepa-conn-test

on:
  push:
    branches: [keepa-conn-test]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Call Keepa from GitHub Actions
        env:
          KEEPA_KEY: ${{ secrets.KEEPA_KEY }}
        run: |
          python3 - <<'PY'
          import urllib.request, json, gzip, os
          key = os.environ["KEEPA_KEY"]
          url = f"https://api.keepa.com/product?key={key}&domain=2&stats=90&history=0&asin=B08RD6S5HF"
          try:
              req = urllib.request.Request(url, headers={"User-Agent": "krato", "Accept-Encoding": "gzip"})
              with urllib.request.urlopen(req, timeout=60) as r:
                  raw = r.read()
                  if raw[:2] == b"\x1f\x8b":
                      raw = gzip.decompress(raw)
                  d = json.loads(raw.decode())
                  print("HTTP", r.status, "| tokensLeft", d.get("tokensLeft"))
                  ps = d.get("products") or []
                  if ps:
                      st = ps[0].get("stats", {})
                      print("Title:", ps[0].get("title"))
                      print("New avg90 (pence):", st.get("avg90", [None, None, None])[1])
                  print("RESULT=SUCCESS  GitHub Actions CAN reach Keepa")
          except urllib.error.HTTPError as e:
              print("HTTPError", e.code)
              print("RESULT=HTTPERROR", e.code)
          except Exception as e:
              print("ERROR", repr(e))
              print("RESULT=FAILED")
          PY
