name: krato-miner

on:
  schedule:
    - cron: "0 1 * * *"    # 01:00 UTC = 02:00 UK (BST) — cedo p/ dar folga ao atraso tipico do cron do GitHub e o pacing do Keepa, e estar PRONTO antes das 04:30
  workflow_dispatch: {}    # permite rodar manual pelo botao/gh

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # o plano Keepa 1-token/min pausa; damos folga
    steps:
      - uses: actions/checkout@v4
      - name: Run Krato miner (pesquisa de mercado via Keepa)
        env:
          KEEPA_KEY: ${{ secrets.KEEPA_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          N_IDEAS: "6"
          PRICE_MIN: "3"
          PRICE_MAX: "300"
          BSR_MAX: "500000"
        run: python3 krato-miner/krato_miner.py
